{% extends "base.html" %}
{% block content %}

<div class="section">
  <div class="progress-container" id="progress">
    <h2 style="color:#1f4e3d;margin-bottom:16px;" id="phase-title">{{ t("step1", lang) }}</h2>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="bar" style="width:0%"></div>
    </div>
    <div class="progress-status" id="status">…</div>
  </div>
</div>

<script>
const bar = document.getElementById('bar');
const status = document.getElementById('status');
const phaseTitle = document.getElementById('phase-title');

function poll() {
  fetch("{{ url_for('analysis_status_api') }}")
    .then(r => r.json())
    .then(d => {
      const pct = d.total > 0 ? Math.round(d.done / d.total * 100) : 0;
      bar.style.width = pct + '%';

      if (d.phase === 'texts') {
        phaseTitle.textContent = "{{ t('step1', lang) }}";
        status.textContent = d.done + '/' + d.total + ': ' + (d.name || '…');
      } else if (d.phase === 'analysis') {
        phaseTitle.textContent = "{{ t('step2', lang) }}";
        status.textContent = d.done + '/' + d.total + ' — ' + (d.name || '…');
      } else if (d.phase === 'done') {
        // Fertig — zum Dashboard weiterleiten
        window.location.href = "{{ url_for('dashboard') }}";
        return;
      } else if (d.phase === 'error') {
        status.textContent = '{{ t("err_analysis_start", lang) }}: ' + (d.error || '');
        status.style.color = '#991b1b';
        return;
      }

      // Weiter pollen alle 2 Sekunden
      setTimeout(poll, 2000);
    })
    .catch(() => {
      status.textContent = '{{ t("err_analysis_start", lang) }}';
      status.style.color = '#991b1b';
    });
}

// Start polling
setTimeout(poll, 1000);
</script>
{% endblock %}
